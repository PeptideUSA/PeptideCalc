<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Black background -->
  <rect width="512" height="512" rx="80" fill="#000000"/>
  
  <!-- Flask body -->
  <path d="M 196 80 L 196 240 L 120 370 C 100 405 125 440 165 440 L 347 440 C 387 440 412 405 392 370 L 316 240 L 316 80 Z" fill="none" stroke="#4da6ff" stroke-width="18" stroke-linejoin="round"/>
  
  <!-- Flask neck top rim -->
  <line x1="172" y1="80" x2="340" y2="80" stroke="#4da6ff" stroke-width="18" stroke-linecap="round"/>
  
  <!-- Liquid fill in flask bottom -->
  <path d="M 140 355 L 120 370 C 100 405 125 440 165 440 L 347 440 C 387 440 412 405 392 370 L 372 355 Z" fill="#ff4444" opacity="0.85"/>
  
  <!-- Liquid surface line -->
  <line x1="140" y1="355" x2="372" y2="355" stroke="#ff4444" stroke-width="10" stroke-linecap="round"/>
  
  <!-- Bubbles in liquid -->
  <circle cx="185" cy="400" r="12" fill="none" stroke="#ffffff" stroke-width="6" opacity="0.7"/>
  <circle cx="256" cy="415" r="8" fill="none" stroke="#ffffff" stroke-width="6" opacity="0.7"/>
  <circle cx="320" cy="395" r="10" fill="none" stroke="#ffffff" stroke-width="6" opacity="0.7"/>
  
  <!-- Stopper/cap at top -->
  <rect x="200" y="58" width="112" height="28" rx="8" fill="#4da6ff"/>
</svg>
